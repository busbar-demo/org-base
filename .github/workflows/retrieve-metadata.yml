name: Retrieve Metadata

# Retrieve a source-format metadata tree from the org into org/metadata/.
# Read-only; OIDC self-mint. Deploys nothing back to the org.

on:
  workflow_dispatch:
    inputs:
      target_instance:
        description: 'Busbar-equipped org instance URL (overrides the SF_INSTANCE_URL repo variable).'
        required: false
        default: ''
      types:
        description: 'Comma-separated metadata types to retrieve. Blank = a curated default set.'
        required: false
        default: ''

permissions:
  contents: write   # commit the retrieved metadata
  id-token: write   # OIDC token exchange

concurrency:
  group: retrieve-metadata
  cancel-in-progress: false

jobs:
  retrieve:
    name: Retrieve org metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Retrieve org metadata
        uses: busbar-actions/sf-metadata-retrieve@main
        with:
          target-instance: ${{ github.event.inputs.target_instance || vars.SF_INSTANCE_URL }}
          types: ${{ github.event.inputs.types || 'CustomObject,ApexClass,ApexTrigger,Flow,PermissionSet,PermissionSetGroup,CustomTab,FlexiPage,CustomApplication,LightningComponentBundle' }}
          target: org/metadata
          commit: true
          commit-message: 'context: refresh org metadata'
